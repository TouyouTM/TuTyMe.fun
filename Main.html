<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TuTyMe fun!</title>
  <style>
    body {
      background-image: url('background.png');
    }
    h2 {
		position: absolute;
		top: 1000px;
	}
	#carButt {
		background-size: cover;
		background-image: url('car.png');
		background-position: center;
	}
	#cPowersButt {
		background-size: cover;
		background-image: url("cPowersLogo.png");
		background-position: center;
	}
	.gLineOne {
		position: absolute;
		width: 30%;
		color: white;
		-webkit-text-stroke: 1px black;
		font-size: 150%;
		height: 30vh;
		transition: 0.1s ease;
		border-radius: 5px;
	}
	.gLineOne:hover {
		width: 31%;
		height: 31vh;
		margin-left: -0.5%;
		margin-right: -0.5%
	}
	.gLineOne:active {
		width: 29%;
		height: 29vh;
		margin-left: 0.5%;
		margin-right: 0.5%
	}
	.gamesDiv{
		background: gray;
		position: absolute;
		top: 35vh;
		left: 5vw;
		width: 90vw;
		height: 0vh;
	}
  </style>
</head>
<body>
    <img src="logoA.png", style="width:20vh; aspect-ratio: 5/3; position: fixed; z-index: 255;" id="title"></img>
    <button style="width: 5vw; height: 3vw; position: absolute; left: 90vw;" onclick="codeI()">codes</button>
    <div class="gamesDiv">
		<button onclick="carclick()" id="carButt" class="gLineOne">Car clicker</button>
		<button onclick="wipPage()" id="cPowersButt" class="gLineOne" style="left: 31%;">WIP</button>
	</div>
	<h2>lol</h2>
	<script>
		let height = window.innerHeight;
		let width = window.innerWidth;
		const carButt = document.getElementById("carButt");
		const cPowersButt = document.getElementById("cPowersButt");
		const logo = document.getElementById('title');
		
		function wipPage(){
			window.location.href = "Wip.html";
		}
		function carclick(){
			window.location.href = "CarClicker/CarClicker.html";
		}

		logo.onmouseover = () => {
			logo.src = 'logoB.png';
		};
		logo.onmouseout = () => {
			logo.src = 'logoA.png';
		};
		function sResize(){
			height = window.innerHeight;
			width = window.innerWidth;
			
			if(height >= width){ // portrait mode
				carButt.style.width = '100%';
				cPowersButt.style.width = '100%';
				cPowersButt.style.top = '32vh';
				cPowersButt.style.left = '0%';
			}
			else{ // albom mode
				carButt.style.width = '30%';
				cPowersButt.style.width = '30%';
				cPowersButt.style.top = '0vh';
				cPowersButt.style.left = '31%';
			}
		}
		let coded = "";
		function codeI() {
			coded = prompt("Input for codes :)");
			if(coded === "mihuilus"){
				logo.src = 'logoC.png';
				document.body.style.background = 'purple';
				alert('🌟 MIHUILUS ПРИВЕТ! 🌟');
			}
			if(coded === "tutyme.fun"){
				document.body.style.background = 'black';
				document.body.style.color = 'lime';
				alert('🐱 TuTyMe mode ON');
			}
		}
		
		sResize();
		window.addEventListener('resize', sResize);
  </script>
</body>
</html>
