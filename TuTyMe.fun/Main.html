<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TuTyMe fun!</title>
  <style>
    body {
      background-image: url('background.png');
    }
    h2 {
		position: absolute;
		top: 1000px;
	}
	button {
		background-image: url('car.png');
		background-position: center;
		position: absolute;
		width: 30%;
		color: white;
		-webkit-text-stroke: 1px black;
		font-size: 150%;
		height: 80%;
		transition: 0.1s ease;
		border-radius: 5px;
	}
	button:hover {
		width: 31%;
		height: 81%;
		margin-left: -0.5%;
		margin-right: -0.5%
	}
	.gamesDiv{
		background: gray;
		position: absolute;
		top: 35vh;
		width: 100vw;
		height: 40vh;
	}
	button:active {
		width: 29%;
		height: 69%;
		margin-left: 0.5%;
		margin-right: 0.5%
	}
  </style>
</head>
<body>
    <img src="logoA.png", style="width:30vh; aspect-ratio: 5/3; position: fixed; z-index: 255;" id="title"></img>
    <div class="gamesDiv">
		<button onclick="carclick()" id="carButt">Car clicker</button>
	</div>
	<h2>lol</h2>
	<script>
		let height = window.innerHeight;
		let width = window.innerWidth;
		const carButt = document.getElementById("carButt");
		
		function carclick(){
			window.open("CarClicker/CarClicker.html");
		}
		const logo = document.getElementById("title");

		logo.onmouseover = () => {
			logo.src = 'logoB.png';
		};
		logo.onmouseout = () => {
			logo.src = 'logoA.png';
		};
		function sResize(){
			height = window.innerHeight;
			width = window.innerWidth;
			
			if(height >= width){
				carButt.style.width = '100%';
			}
			else{
				carButt.style.width = '30%';
			}
		}
		
		sResize();
		window.addEventListener('resize', sResize);
  </script>
</body>
</html>
