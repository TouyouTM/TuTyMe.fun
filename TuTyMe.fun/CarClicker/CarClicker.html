<!doctype HTML>

<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="CarClicker" content="width=device-width, initial-scale=1">
	<title>car clicker [TuTyMe fun!]</title>
	<style>
		#carButt {
			background-image: url(car.png);
			background-position: center;
			transition: 0.05s ease;
			position: absolute; 
			width: 40vh;
			height: 30vh;
			left: calc(50vw - 20vh);
			top: calc(50vh - 15vh);
		}
		#carButt:hover {
			width: 41vh;
			height: 31vh;
			margin-left: -0.5vh;
			margin-top: -0.5vh;
		}
		#carButt:active {
			width: 39vh;
			height: 29vh;
			margin-left: 0.5vh;
			margin-top: 0.5vh;
		}
		#scoreTxt {
			color: white;
			background: black;
			position: absolute;
			width: 20vh;
			height: 10vh;
			left: calc(50vw - 10vh);
			top: calc(10vh - 5vh);
		}
		body {
			background: grey;
		}
	</style>
</head>

<body>
	<img src="logoA.png", style="width:30vh; aspect-ratio: 5/3; position: fixed; z-index: 255;" id="title"></img>
	
	<button id="carButt">car</button>
	<h1 id="scoreTxt">0</h1>
	
	<script>
		const scoreTxt = document.getElementById("scoreTxt");
		const carButt = document.getElementById("carButt");
		const logo = document.getElementById("title");
		let score = 0;
		
		carButt.onclick = () => {
			score++;
			scoreTxt.innerText = score.toString();
		}
		
		logo.onmouseover = () => {
			logo.src = "logoB.png";
		};
		logo.onmouseout = () => {
			logo.src = "logoA.png";
		};
		logo.onclick = () => {
			window.open("../Main.html");
		};
	</script>
</body>
</html>
