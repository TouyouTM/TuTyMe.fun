<!doctype HTML>

<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="CarClicker" content="width=device-width, initial-scale=1">
	<title>car clicker [TuTyMe fun!]</title>
	<style>
		#carButt {
			background-size: cover;
			touch-action: manipulation;
			background-image: url(car.png);
			background-position: center;
			transition: 0.05s ease;
			position: absolute; 
			width: 40vh;
			height: 30vh;
			left: calc(50vw - 20vh);
			top: calc(50vh - 15vh);
		}
		#carButt:hover {
			width: 41vh;
			height: 31vh;
			margin-left: -0.5vh;
			margin-top: -0.5vh;
		}
		#carButt:active {
			width: 39vh;
			height: 29vh;
			margin-left: 0.5vh;
			margin-top: 0.5vh;
		}
		#scoreTxt {
			color: white;
			background: black;
			position: absolute;
			width: 20vh;
			height: 10vh;
			left: calc(50vw - 10vh);
			top: calc(10vh - 5vh);
		}
		#shopDiv {
			background: lightgrey;
			width: 100vw;
			height: 100vh;
			position: absolute;
			top: 90vh;
		}
		body {
			background: grey;
			margin: 0px;
		}
		.updateButt {
			width: 100%;
			height: 7vh;
		}
	</style>
</head>

<body>
	<img src="logoA.png", style="width:20vh; aspect-ratio: 5/3; position: fixed; z-index: 255;" id="title"></img>
	
	<h1 id="scoreTxt">0</h1>
	<button id="carButt">car</button>
	
	<div id="shopDiv">
		<h1>SHOP</h1>
		<button id="clickUpd" class="updateButt">upgrade click [1 per click/100]</button>
	</div>
	
	<script>
		const scoreTxt = document.getElementById("scoreTxt");
		const carButt = document.getElementById("carButt");
		const logo = document.getElementById("title");
		const clickUpd = document.getElementById("clickUpd");
		let score = 0;
		let clickUpdNeed = 100;
		let perClick = 1;
		
		clickUpd.onclick = () => {
			if(score >= clickUpdNeed){
				score -= clickUpdNeed;
				perClick++;
				clickUpdNeed += 150;
				clickUpd.innerText = "upgrade click [" + perClick + " per click/" + clickUpdNeed + "]";
				scoreTxt.innerText = score;
			}
		}
		
		carButt.onclick = () => {
			score += perClick;
			scoreTxt.innerText = score.toString();
		}
		
		logo.onmouseover = () => {
			logo.src = "logoB.png";
		};
		
		logo.onmouseout = () => {
			logo.src = "logoA.png";
		};
		
		logo.onclick = () => {
			window.location.href = "../Main.html";
		};
	</script>
</body>
</html>
